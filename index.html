<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>RESTEV – Prévention Mobile</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 480px;
            margin: auto;
            padding: 0;
            background: #f3f4f6;
        }

        /* ---- ÉCRAN D’ACCUEIL ---- */
        #accueil {
            height: 100vh;
            background: linear-gradient(135deg, #2563eb, #9333ea);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .logo {
            width: 160px;
            margin-bottom: 25px;
        }

        .btn {
            width: 90%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            margin-top: 10px;
        }

        .btn-start {
            background: white;
            color: #2563eb;
        }

        .btn-menu {
            background: #2563eb;
            color: white;
            font-size: 18px;
        }

        .btn-back {
            background: #d1d5db;
            color: black;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            text-align: left;
        }

        select {
            width: 100%;
            font-size: 18px;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<!-- ✅ ÉCRAN D’ACCUEIL -->
<div id="accueil">
    <img src="logo.png" class="logo">
    <h1>Prévention Mobile</h1>
    <p>Application officielle RESTEV</p>

    <button class="btn btn-start" onclick="ouvrirMenuPrincipal()">ENTRER</button>

    <button class="btn btn-start" style="margin-top:20px;background:#9333ea;" onclick="alert('À propos du RESTEV')">À propos</button>
    <button class="btn btn-start" style="background:#4ade80;" onclick="alert('Contact RESTEV : contact@restev.fr')">Contact</button>
    <button class="btn btn-start" style="background:#ef4444;" onclick="alert('Urgences : 112 / 18 / 15')">Urgences</button>
</div>

<!-- ✅ MENU PRINCIPAL -->
<div id="menuPrincipal" class="card" style="display:none;">
    <h2>Menu principal</h2>

    <button class="btn btn-menu" onclick="ouvrirMetiers()">Métiers</button>
    <button class="btn btn-menu" onclick="alert('Module Risques en préparation')">Risques</button>
    <button class="btn btn-menu" onclick="alert('Module CMR en préparation')">CMR</button>
    <button class="btn btn-menu" onclick="alert('Fiches INRS en préparation')">Fiches INRS</button>
    <button class="btn btn-menu" onclick="alert('Documents PDF en préparation')">Documents PDF</button>
    <button class="btn btn-menu" onclick="alert('Signalement danger en préparation')">Signaler un danger</button>
    <button class="btn btn-menu" onclick="alert('Plan de prévention en préparation')">Plan de prévention</button>

    <button class="btn btn-back" onclick="retourAccueil()">← Retour accueil</button>
</div>

<!-- ✅ MÉTIERS -->
<div id="menuMetiers" class="card" style="display:none;">
    <h2>Choisis ton métier :</h2>

    <select id="select-metier">
        <option value=""></option>
        <option value="maintenance">Technicien maintenance</option>
        <option value="boucher">Boucher</option>
        <option value="boulanger">Boulanger</option>
    </select>

    <button class="btn btn-menu" onclick="validerMetier()">VALIDER ✅</button>
    <button class="btn btn-back" onclick="ouvrirMenuPrincipal()">← Retour</button>
</div>

<!-- ✅ RISQUES -->
<div id="menuRisks" class="card" style="display:none;"></div>

<script>

/* ✅ BASE MÉTIERS / RISQUES */
const data = {

    maintenance: {
        label: "Technicien maintenance",
        risques: {
            "Chute de hauteur": `
<h3>⬆️ Chute de hauteur</h3>
• Travail en hauteur<br><br>
<b>Prévention :</b><br>
✅ Harnais<br>
✅ Plateformes<br>
`,
            "Risque électrique": `
<h3>⚡ Risque électrique</h3>
• Armoire sous tension<br><br>
<b>Prévention :</b><br>
✅ VAT<br>
✅ Habilitation<br>
`
        }
    },

    boucher: {
        label: "Boucher",
        risques: {
            "Coupures": `
<h3>🔪 Coupures</h3>
✅ Gants anticoupures<br>
✅ Couteaux affûtés<br>
`
        }
    },

    boulanger: {
        label: "Boulanger",
        risques: {
            "Brûlures": `
<h3>🔥 Brûlures</h3>
✅ Gants thermiques<br>
✅ Manipulation sécurisée<br>
`
        }
    }

};


/* ✅ ✅ NAVIGATION */
function ouvrirMenuPrincipal() {
    document.getElementById("accueil").style.display = 'none';
    document.getElementById("menuPrincipal").style.display = 'block';
    document.getElementById("menuMetiers").style.display = 'none';
    document.getElementById("menuRisks").style.display = 'none';
}

function ouvrirMetiers() {
    document.getElementById("menuPrincipal").style.display = 'none';
    document.getElementById("menuMetiers").style.display = 'block';
}

function retourAccueil() {
    document.getElementById("accueil").style.display = 'flex';
    document.getElementById("menuPrincipal").style.display = 'none';
    document.getElementById("menuMetiers").style.display = 'none';
    document.getElementById("menuRisks").style.display = 'none';
}

/* ✅ ✅ VALIDER UN MÉTIER */
function validerMetier() {
    const metier = document.getElementById("select-metier").value;

    if (metier === "") {
        alert("Merci de sélectionner un métier.");
        return;
    }

    afficherRisques(metier);
}

/* ✅ ✅ AFFICHER RISQUES */
function afficherRisques(job) {

    document.getElementById("menuMetiers").style.display = "none";
    const zone = document.getElementById("menuRisks");
    zone.style.display = "block";

    let html = `
<button class='btn btn-back' onclick='ouvrirMetiers()'>← Retour métiers</button>
<h2>Risques – ${data[job].label}</h2>
`;

    for (let r in data[job].risques) {
        html += `<button class='btn btn-menu' onclick="showDetail('${job}','${r}')">${r}</button>`;
    }

    zone.innerHTML = html;
}

/* ✅ ✅ AFFICHAGE DÉTAIL */
function showDetail(job, risque) {

    document.getElementById("menuRisks").innerHTML = `
<button class='btn btn-back' onclick="afficherRisques('${job}')">← Retour</button>
<h2>${risque}</h2>
${data[job].risques[risque]}
`;
}

</script>

</body>
</html>
