<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Prévention Mobile - RESTEV</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 450px;
      margin: auto;
      padding: 20px;
      background: #f3f4f6;
    }

    /* ----- ÉCRAN D'ACCUEIL ----- */
    #accueil {
      text-align: center;
      margin-top: 80px;
    }

    #accueil h1 {
      font-size: 28px;
      background: #2563eb;
      color: white;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.2);
    }

    #accueil p {
      font-size: 18px;
      color: #333;
      margin-bottom: 30px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      margin-top: 10px;
    }

    .btn-start { background: #2563eb; color: white; }
    .btn-job { background: #2563eb; color: white; }
    .btn-risk { background: #f97316; color: white; }
    .btn-back { background: #d1d5db; color: black; }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<!-- ✅ ÉCRAN D'ACCUEIL RESTEV -->
<div id="accueil">
  <h1>RESTEV</h1>
  <p>Application Prévention des Risques</p>
  <button class="btn btn-start" onclick="entrer()">🚀 Entrer</button>
</div>

<!-- ✅ LISTE DES MÉTIERS -->
<div id="menu-metiers" class="card" style="display:none;">
  <h2>Choisis ton métier :</h2>

  <button class="btn btn-job" onclick="afficherRisques('maintenance')">Technicien maintenance</button>
  <button class="btn btn-job" onclick="afficherRisques('commercial')">Commercial itinérant</button>
  <button class="btn btn-job" onclick="afficherRisques('boucher')">Boucher</button>
  <button class="btn btn-job" onclick="afficherRisques('coiffeur')">Coiffeur / Coiffeuse</button>
  <button class="btn btn-job" onclick="afficherRisques('batiment')">Ouvrier du bâtiment</button>
  <button class="btn btn-job" onclick="afficherRisques('livreur')">Conducteur / Livreur</button>

  <button class="btn btn-back" onclick="retourAccueil()">← Retour accueil</button>
</div>

<!-- ✅ LISTE DES RISQUES -->
<div id="menu-risques" class="card" style="display:none;"></div>

<script>
/* ✅ BASE DE DONNÉES MÉTIERS / RISQUES */
const data = {

  maintenance: {
    label: "Technicien maintenance",
    risques: {
      chute: "Chute de hauteur : harnais, protections collectives.",
      cmr: "CMR : produits dangereux, EPI adaptés.",
      electrique: "Risque électrique : consignation, habilitation.",
      tms: "TMS : ergonomie, alternance."
    }
  },

  commercial: {
    label: "Commercial itinérant",
    risques: {
      routier: "Risque routier : pauses, téléphone interdit.",
      stress: "Stress : organisation, prévention RPS."
    }
  },

  boucher: {
    label: "Boucher",
    risques: {
      coupure: "Coupures : gants anticoupure.",
      manutention: "Manutention : gestes adaptés.",
      cmr: "CMR nettoyants : ventilation, gants."
    }
  },

  coiffeur: {
    label: "Coiffeur / Coiffeuse",
    risques: {
      chimique: "Produits chimiques : gants, lunettes.",
      posture: "Postures prolongées : pauses, réglage poste."
    }
  },

  batiment: {
    label: "Ouvrier du bâtiment",
    risques: {
      chute: "Chute : échafaudages sécurisés.",
      manutention: "Charges lourdes : techniques adaptées.",
      bruit: "Bruit : casque anti-bruit.",
      poussiere: "Poussières : masques adaptés."
    }
  },

  livreur: {
    label: "Conducteur / Livreur",
    risques: {
      routier: "Risque routier : vigilance + pauses.",
      manutention: "Colis : diable, transpalette.",
      chute: "Chutes : sols glissants."
    }
  }
};

/* ✅ ENTRER DANS L’APPLICATION */
function entrer() {
  document.getElementById("accueil").style.display = "none";
  document.getElementById("menu-metiers").style.display = "block";
}

/* ✅ AFFICHER LES RISQUES D’UN MÉTIER */
function afficherRisques(metier) {
  const zone = document.getElementById("menu-risques");
  zone.style.display = "block";
  document.getElementById("menu-metiers").style.display = "none";

  let html = `<button class="btn btn-back" onclick="retourMetiers()">← Retour métiers</button>`;
  html += `<h2>Risques – ${data[metier].label}</h2>`;

  for (let r in data[metier].risques) {
    html += `<button class="btn-risk btn" onclick="afficherDetail('${metier}','${r}')">${r}</button>`;
  }

  zone.innerHTML = html;
}

/* ✅ AFFICHER LE DÉTAIL D’UN RISQUE */
function afficherDetail(metier, risque) {
  document.getElementById("menu-risques").innerHTML = `
    <button class="btn btn-back" onclick="afficherRisques('${metier}')">← Retour risques</button>
    <h2>${risque}</h2>
    <p>${data[metier].risques[risque]}</p>
  `;
}

/* ✅ RETOUR AUX MÉTIERS */
function retourMetiers() {
  document.getElementById("menu-risques").style.display = "none";
  document.getElementById("menu-metiers").style.display = "block";
}

/* ✅ RETOUR ACCUEIL */
function retourAccueil() {
  document.getElementById("menu-risques").style.display = "none";
  document.getElementById("menu-metiers").style.display = "none";
  document.getElementById("accueil").style.display = "block";
}
</script>

</body>
</html>
