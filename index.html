<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Prévention Mobile</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 400px;
      margin: auto;
      padding: 20px;
      background: #f3f4f6;
    }
    h1 {
      text-align: center;
      background: #2563eb;
      color: white;
      padding: 10px;
      border-radius: 8px;
    }
    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }
    .btn {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }
    .btn-back {
      background: #d1d5db;
      color: black;
    }
    .btn-risk {
      background: #f97316;
    }
  </style>
</head>

<body>

<h1>Prévention Mobile</h1>

<!-- MÉTIERS -->
<div id="menu-metiers" class="card">
  <h2>Choisis ton métier :</h2>
  <button class="btn" onclick="afficherRisques('maintenance')">Technicien maintenance</button>
  <button class="btn" onclick="afficherRisques('commercial')">Commercial itinérant</button>
</div>

<!-- RISQUES -->
<div id="menu-risques" class="card" style="display:none;"></div>

<script>
const data = {
  maintenance: {
    label: "Technicien maintenance",
    risques: {
      chute: "Chute de hauteur : Harnais, protections collectives.",
      electrique: "Risque électrique : Consignation, habilitation.",
      tms: "TMS : Ergonomie, pauses régulières."
    }
  },

  commercial: {
    label: "Commercial itinérant",
    risques: {
      routier: "Risque routier : Planification, pauses, pas de téléphone.",
      stress: "Stress : Organisation, prévention RPS."
    }
  }
};

function afficherRisques(metier) {
  document.getElementById("menu-metiers").style.display = "none";

  const zone = document.getElementById("menu-risques");
  zone.style.display = "block";

  let html = `<button class="btn-back btn" onclick="retour()">← Retour</button>`;
  html += `<h2>Risques – ${data[metier].label}</h2>`;

  for (let r in data[metier].risques) {
    html += `<button class="btn-risk btn" onclick="afficherDetail('${metier}','${r}')">${r}</button>`;
  }

  zone.innerHTML = html;
}

function afficherDetail(metier, risque) {
  const zone = document.getElementById("menu-risques");
  zone.innerHTML = `
    <button class="btn-back btn" onclick="afficherRisques('${metier}')">← Retour</button>
    <h2>${risque}</h2>
    <p>${data[metier].risques[risque]}</p>
  `;
}

function retour() {
  document.getElementById("menu-risques").style.display = "none";
  document.getElementById("menu-metiers").style.display = "block";
}
</script>

</body>
</html>
