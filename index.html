<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Prévention Mobile</title>

  <style>
    body { font-family: Arial; max-width: 450px; margin: auto; padding: 20px; background: #f3f4f6; }
    h1 { text-align: center; background: #2563eb; color: white; padding: 15px; border-radius: 12px; }
    .card { background: white; padding: 20px; border-radius: 12px; margin-top: 20px; }
    .btn { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; font-size: 16px; cursor: pointer; }
    .btn-job { background: #2563eb; color: white; }
    .btn-risk { background: #f97316; color: white; }
    .btn-back { background: #d1d5db; color: black; }
  </style>
</head>

<body>

<h1>Prévention Mobile</h1>

<div id="menu-metiers" class="card">
  <h2>Métiers :</h2>

  <button class="btn btn-job" onclick="showRisks('maintenance')">Technicien maintenance</button>
  <button class="btn btn-job" onclick="showRisks('commercial')">Commercial itinérant</button>
  <button class="btn btn-job" onclick="showRisks('boucher')">Boucher</button>
  <button class="btn btn-job" onclick="showRisks('coiffeur')">Coiffeur / Coiffeuse</button>
  <button class="btn btn-job" onclick="showRisks('batiment')">Ouvrier du bâtiment</button>
  <button class="btn btn-job" onclick="showRisks('livreur')">Conducteur / Livreur</button>
</div>

<div id="menu-risks" class="card" style="display:none;"></div>

<script>
// ✅ Clés simples = PAS D'ERREUR
const data = {

  maintenance: {
    label: "Technicien maintenance",
    risks: {
      chute: "Chute de hauteur : harnais, protections collectives.",
      cmr: "CMR : substitution, FDS, EPI.",
      electrique: "Risque électrique : consignation, habilitation.",
      tms: "TMS : ergonomie, alternance des tâches."
    }
  },

  commercial: {
    label: "Commercial itinérant",
    risks: {
      routier: "Risque routier : pauses régulières, vigilance.",
      stress: "Stress : organisation, prévention RPS."
    }
  },

  boucher: {
    label: "Boucher",
    risks: {
      coupure: "Coupures : gants anticoupure.",
      manutention: "Manutention : gestes adaptés.",
      cmr: "CMR nettoyants : FDS, ventilation."
    }
  },

  coiffeur: {
    label: "Coiffeur / Coiffeuse",
    risks: {
      chimique: "Produits chimiques : gants, lunettes.",
      posture: "Postures prolongées : pauses, réglage poste."
    }
  },

  batiment: {
    label: "Ouvrier du bâtiment",
    risks: {
      chute: "Chutes de hauteur : échafaudages sécurisés.",
      manutention: "Manutention lourde : techniques de levage.",
      bruit: "Bruit : protections auditives.",
      poussiere: "Poussières : masques adaptés."
    }
  },

  livreur: {
    label: "Conducteur / Livreur",
    risks: {
      routier: "Risque routier : planning réaliste.",
      manutention: "Manutention : diable, transpalette.",
      chute: "Chutes : attention aux sols glissants."
    }
  }

};

// ✅ AFFICHAGE DES RISQUES
function showRisks(jobKey) {
  document.getElementById("menu-metiers").style.display = "none";

  const zone = document.getElementById("menu-risks");
  zone.style.display = "block";

  let html = `<button class="btn btn-back" onclick="retour()">← Retour</button>`;
  html += `<h2>Risques – ${data[jobKey].label}</h2>`;

  for (let r in data[jobKey].risks) {
    html += `<button class="btn btn-risk" onclick="showDetail('${jobKey}', '${r}')">${r}</button>`;
  }

  zone.innerHTML = html;
}

// ✅ AFFICHAGE DES DÉTAILS
function showDetail(jobKey, riskKey) {
  const zone = document.getElementById("menu-risks");
  zone.innerHTML = `
    <button class="btn btn-back" onclick="showRisks('${jobKey}')">← Retour</button>
    <h2>${riskKey}</h2>
    <p>${data[jobKey].risks[riskKey]}</p>
  `;
}

// ✅ RETOUR
function retour() {
  document.getElementById("menu-risks").style.display = "none";
  document.getElementById("menu-metiers").style.display = "block";
}
</script>

</body>
</html>
