<!DOCTYPE html>
<html lang="fr">
<head>

  <title>Prévention Mobile</title>

  <style>
    body {

    h1 {
      text-align: center;
      background: #2563eb;
      color: white;
      padding: 15px;

      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .btn {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }

    .btn-job { background: #2563eb; color: white; }
    .btn-risk { background: #f97316; color: white; }
    .btn-back { background: #d1d5db; color: black; }

    .detail-box {
      background: #fff7ed;
      padding: 20px;
      border-radius: 12px;
    }

    h2 {
      margin-bottom: 10px;
      color: #111827;
    }
  </style>
</head>

</div>
