<!DOCTYPE html>
<html lang="fr">
<head>

  <title>Prévention Mobile</title>

  <style>
    body { 
      font-family: Arial;

      margin: auto;

    }

    /* ---- ÉCRAN D’ACCUEIL ---- */
    #accueil {
      text-align: center;
      margin-top: 60px;
    }

    #accueil h1 {

      margin-bottom: 20px;
      background: #2563eb;
      color: white;
      padding: 15px;
      border-radius: 12px;
    }

    #accueil p {
      font-size: 18px;
      margin-bottom: 30px;

    /* ---- BOUTONS ---- */
    .btn {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }
    .btn-start { background: #2563eb; color: white; }
    .btn-job { background: #2563eb; color: white; }
    .btn-risk { background: #f97316; color: white; }
    .btn-back { background: #d1d5db; color: black; }

    /* ---- CARTES ---- */
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<!-- ✅ ÉCRAN D’ACCUEIL -->
<div id="accueil">

  <p>Application de prévention des risques en entreprise</p>
  <button class="btn btn-start" onclick="entrer()">🚀 Entrer</button>
</div>

  <button class="btn btn-back" onclick="retourAccueil()">← Retour accueil</button>
</div>
